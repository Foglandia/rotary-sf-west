media:
  input: client/public/uploads
  output: /uploads
  
content:
  - name: activities
    label: Activities
    path: content/activities
    type: collection
    view:
      fields: [title, status, date, category, location]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - name: status
        label: Status
        type: select
        required: true
        options:
          values:
            - value: upcoming
              label: Upcoming
            - value: past
              label: Past
      - { name: date, label: Date, type: date, required: true }
      - name: startTime
        label: Start Time
        type: select
        options:
          values:
            - { value: "12:00", label: "12:00" }
            - { value: "12:30", label: "12:30" }
            - { value: "1:00", label: "1:00" }
            - { value: "1:30", label: "1:30" }
            - { value: "2:00", label: "2:00" }
            - { value: "2:30", label: "2:30" }
            - { value: "3:00", label: "3:00" }
            - { value: "3:30", label: "3:30" }
            - { value: "4:00", label: "4:00" }
            - { value: "4:30", label: "4:30" }
            - { value: "5:00", label: "5:00" }
            - { value: "5:30", label: "5:30" }
            - { value: "6:00", label: "6:00" }
            - { value: "6:30", label: "6:30" }
            - { value: "7:00", label: "7:00" }
            - { value: "7:30", label: "7:30" }
            - { value: "8:00", label: "8:00" }
            - { value: "8:30", label: "8:30" }
            - { value: "9:00", label: "9:00" }
            - { value: "9:30", label: "9:30" }
            - { value: "10:00", label: "10:00" }
            - { value: "10:30", label: "10:30" }
            - { value: "11:00", label: "11:00" }
            - { value: "11:30", label: "11:30" }
      - name: startAmPm
        label: Start AM/PM
        type: select
        options:
          values:
            - { value: "AM", label: "AM" }
            - { value: "PM", label: "PM" }
      - name: endTime
        label: End Time
        type: select
        options:
          values:
            - { value: "12:00", label: "12:00" }
            - { value: "12:30", label: "12:30" }
            - { value: "1:00", label: "1:00" }
            - { value: "1:30", label: "1:30" }
            - { value: "2:00", label: "2:00" }
            - { value: "2:30", label: "2:30" }
            - { value: "3:00", label: "3:00" }
            - { value: "3:30", label: "3:30" }
            - { value: "4:00", label: "4:00" }
            - { value: "4:30", label: "4:30" }
            - { value: "5:00", label: "5:00" }
            - { value: "5:30", label: "5:30" }
            - { value: "6:00", label: "6:00" }
            - { value: "6:30", label: "6:30" }
            - { value: "7:00", label: "7:00" }
            - { value: "7:30", label: "7:30" }
            - { value: "8:00", label: "8:00" }
            - { value: "8:30", label: "8:30" }
            - { value: "9:00", label: "9:00" }
            - { value: "9:30", label: "9:30" }
            - { value: "10:00", label: "10:00" }
            - { value: "10:30", label: "10:30" }
            - { value: "11:00", label: "11:00" }
            - { value: "11:30", label: "11:30" }
      - name: endAmPm
        label: End AM/PM
        type: select
        options:
          values:
            - { value: "AM", label: "AM" }
            - { value: "PM", label: "PM" }
      - { name: location, label: Location, type: string, required: true }
      - { name: address, label: Address, type: string }
      - name: category
        label: Category
        type: select
        options:
          values:
            - { value: club, label: Club Activity }
            - { value: meeting, label: Club Meeting }
            - { value: community, label: Community Event }
            - { value: other_rotary, label: Other Rotary Club Event }
      - { name: description, label: Description, type: text }
      - { name: image, label: Image, type: image }
      - { name: extraImages, label: Extra Images, type: image, list: true }
      - { name: video, label: Video URL, type: string }
      - { name: body, label: Full Description, type: rich-text }

  - name: leaders
    label: Leadership Team
    path: content/leaders
    type: collection
    fields:
      - { name: name, label: Name, type: string, required: true }
      - { name: role, label: Role, type: string, required: true }
      - { name: bio, label: Bio, type: text }
      - { name: email, label: Email, type: string }
      - { name: image, label: Photo, type: image }

  - name: home
    label: Home Page
    path: content/home
    type: collection
    fields:
      - { name: welcomeTitle, label: Welcome Title, type: string }
      - { name: welcomeText, label: Welcome Text, type: text }
      - { name: missionStatement, label: Mission Statement, type: text }


